name: WranglerMac
options:
  bundleIdPrefix: com.moerdowo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Hardened runtime is off so the app can execute the bundled (unsigned) Node
    # and workerd binaries locally. For notarized distribution, re-enable it and
    # codesign the nested binaries with inherit entitlements.
    ENABLE_HARDENED_RUNTIME: NO
targets:
  WranglerMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/WranglerMac
      # Self-contained Node + wrangler runtime, copied verbatim into the app's
      # Resources (folder reference — not compiled). Generate with
      # scripts/bundle-wrangler.sh.
      - path: Runtime
        buildPhase: resources
        type: folder
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moerdowo.WranglerMac
        PRODUCT_NAME: WranglerMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: WranglerMac
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: Sparkle
    info:
      path: Sources/WranglerMac/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: "public.app-category.developer-tools"
        SUFeedURL: "https://raw.githubusercontent.com/moerdowo/WranglerMac/main/appcast.xml"
        SUPublicEDKey: "8P15E4/GqpXPmMZ3uUaF7PXYHhiFBLN7DdeLVFtRGOA="
        SUEnableInstallerLauncherService: true
